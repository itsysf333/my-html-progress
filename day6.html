<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="device-width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h3>Registration Form</h3>
        <label>Name:</label>
        <br>
        <label>Father Name:</label>
        <br><br>
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
        <br><br>
        <label>Gender:</label>
        <input type="radio" name="gender" value="male">male
        <input type="radio" name="gender" value="female">female
        <br><br>
        <h4>Select Favourite Subjects</h4>
        <input type="checkbox" name="subject" value="physics">Physics
        <input type="checkbox" name="subject" value="Math">Math 
        <br>
        <input type="checkbox" name="subject" value="English">English 
        <input type="checkbox" name="subject" value="Biology">Biology
        <br>
        <input type="checkbox" name="subject" value="Computer">Computer
        <br><br>
        Select Your Country:
        <select name="Countries">
            <option value="USA">USA</option>
            <option value="Russia">Russia</option>
            <option value="China">China</option>
        </select>
        <br><br>
        <textarea name="Feedback" placeholder="Share Your Thought"></textarea>
        <br><br>
        <input type="Submit" value="Submit">
    </form>
</body>
</html>
